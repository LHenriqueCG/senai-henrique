<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Bandeiras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="quiz-container">
  <h2 class="sr-only">Quiz de bandeiras — adivinhe o país pela bandeira</h2>

  <div id="s-loading" class="screen active" style="padding:2rem 0; text-align:center">
    <div class="icon-wrapper" style="animation: spin 2s linear infinite;">
      <i class="ti ti-globe" style="font-size:32px" aria-hidden="true"></i>
    </div>
    <p style="margin-top:1rem; font-weight: 500">Carregando países...</p>
  </div>

  <div id="s-start" class="screen" style="text-align:center">
    <div style="margin-bottom:2rem">
      <div class="icon-wrapper">
        <i class="ti ti-flag" style="font-size:32px" aria-hidden="true"></i>
      </div>
      <h1>Quiz de Bandeiras</h1>
      <p>10 perguntas • 15 segundos por pergunta</p>
    </div>
    
    <div class="stats-grid grid-2">
      <div class="stat"><div class="stat-label">Recorde</div><div class="stat-value" id="hi-score">—</div></div>
      <div class="stat"><div class="stat-label">Partidas</div><div class="stat-value" id="hi-games">0</div></div>
    </div>
    
    <div style="margin-bottom:1.5rem; text-align: left;">
      <label for="diff">Dificuldade</label>
      <select id="diff">
        <option value="easy">Fácil — países mais conhecidos</option>
        <option value="hard">Difícil — todos os países</option>
      </select>
    </div>
    <button id="btn-start" class="btn-primary" onclick="startGame()">Começar Quiz</button>
  </div>

  <div id="s-quiz" class="screen">
    <div class="stats-grid grid-3">
      <div class="stat"><div class="stat-label">Pergunta</div><div class="stat-value"><span id="q-num">1</span>/10</div></div>
      <div class="stat"><div class="stat-label">Pontos</div><div class="stat-value" id="q-score">0</div></div>
      <div class="stat"><div class="stat-label">Tempo</div><div class="stat-value" id="q-time">15</div></div>
    </div>
    
    <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
    
    <div class="flag-container">
      <img id="flag-img" class="flag-img" src="" alt="Bandeira do país a adivinhar">
    </div>
    
    <div id="options" class="options-grid"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div id="s-result" class="screen">
    <div style="text-align:center; margin-bottom:1.5rem">
      <p style="text-transform: uppercase; font-size: 11px; font-weight: 600; letter-spacing: 0.5px;">Pontuação Final</p>
      <div style="font-size:48px; font-weight:700; color: var(--primary); margin: 4px 0" id="final-score">0</div>
      <div style="font-size:15px; font-weight:600;" id="final-msg"></div>
    </div>
    
    <div class="stats-grid grid-3">
      <div class="stat"><div class="stat-label">Acertos</div><div class="stat-value" id="r-correct">0</div></div>
      <div class="stat"><div class="stat-label">Recorde</div><div class="stat-value" id="r-best">0</div></div>
      <div class="stat"><div class="stat-label">Média</div><div class="stat-value" id="r-avg">—</div></div>
    </div>
    
    <div id="result-list" class="result-list-container"></div>
    <button class="btn-primary" onclick="showStart()">Jogar Novamente</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
