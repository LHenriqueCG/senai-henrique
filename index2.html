<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Senai Aluno</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<script>

    const telalogin = document.getElementById("login");
    const telaIntelahome = document.getElementById("home").;

    function login() {
        let usuario = document.getAnimations("usuario").value;
        let senha = document.getAnimations("senha").value;

        if (usuario === "aluno" && senha == "1234") {
            alert("Login bem-sucedido!");
            mostrarHome();
            esconderLogin();
        }
    }

    function mostrarHome() {
        telaIntelahome.style.display = "block";
    }

    function esconderLogin() {
        telalogin.style.display = "none";
    }
</script>

<style>
    .estilo {
        font-family: Arial, sans-serif;
    }
</style>

<body>
    <section class="estilo" id="login">
        <div class="">
            <h1>Sistema Senai Aluno</h1>
        </div>
        <input type="text" placeholder="Digite o usuário"><br>
        <input type="text" placeholder="Senha"><br>
        <input type="button" value="Entrar" onclick="login()"><br>
    </section>

    <section class="" id="home" style="display: none;">
        <div class="">
            <h1>Bem-vindo ao sistema Senai Aluno!</h1>
        </div>
</body>

</html>
