<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title>Teste de CEP</title>

    <script>
        async function teste() {
            let cep = document.getElementById('valor').value;
            let div = document.getElementById('resultado');

            // Feedback visual de carregamento usando a classe certa do CSS
            div.innerHTML = "<p class='carregando'>Buscando endereço...</p>";

            cep = cep.replace(/\D/g, '');
            if (cep.length !== 8) {
                // Mensagem usando a classe 'erro' para ficar dentro do card vermelho
                div.innerHTML = "<span class='erro'>CEP inválido! Digite 8 números.</span>";
                return;
            }

            try {
                let resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                let dados = await resposta.json();

                if (dados.erro) {
                    div.innerHTML = "<span class='erro'>CEP não encontrado!</span>";
                } else {
                    // Injeta a estrutura de blocos (cards de resultado) que o CSS vai estilizar
                    div.innerHTML = `
                        <div class='item-resultado'><strong>Logradouro:</strong> <span>${dados.logradouro || 'Não informado'}</span></div>
                        <div class='item-resultado'><strong>Bairro:</strong> <span>${dados.bairro || 'Não informado'}</span></div>
                        <div class='item-resultado'><strong>Região:</strong> <span>${dados.regiao || 'Não informado'}</span></div>
                        <div class='item-resultado'><strong>Cidade:</strong> <span>${dados.localidade} - ${dados.uf}</span></div>
                        <div class='item-resultado'><strong>DDD:</strong> <span>${dados.ddd || 'Não informado'}</span></div>
                    `;
                }

            } catch (erro) {
                div.innerHTML = "<span class='erro'>Erro ao conectar no serviço de CEP.</span>";
            }
        }
    </script>
</head>

<body>

    <main class="container">
        <h1>Buscador de CEP</h1>
        <p class="subtitulo">Digite o CEP para localizar o endereço completo</p>

        <div class="busca-box">
            <input type="text" id="valor" placeholder="Ex: 20271060" maxlength="9">
            <button onclick="teste()">Pronto!</button>
        </div>

        <div id="resultado"></div>
    </main>

</body>

</html>
